<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Shader Experience</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }

    #ui {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
      font-family: 'Inter', sans-serif;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
    }

    .logo {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    .logo span {
      color: rgba(120, 180, 255, 0.9);
    }

    .status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 2px;
    }

    .status .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(80, 200, 120, 0.8);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .bottom-bar {
      position: absolute;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 20px 30px;
    }

    .hint {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 1px;
      line-height: 1.8;
    }

    .hint strong {
      color: rgba(120, 180, 255, 0.5);
      font-weight: 400;
    }

    .coordinates {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.15);
      text-align: right;
      line-height: 1.8;
    }

    .scanline-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    #state-indicator {
      position: fixed;
      top: 50%;
      right: 30px;
      transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 3px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      pointer-events: none;
      z-index: 10;
      transition: color 0.5s;
    }

    #state-indicator.active {
      color: rgba(120, 180, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="scanline-overlay"></div>

  <div id="ui">
    <div class="top-bar">
      <div class="logo">N<span>EX</span>US</div>
      <div class="status">
        <span class="dot"></span> SYSTEM ONLINE — v2.4.1
      </div>
    </div>

    <div class="bottom-bar">
      <div class="hint">
        <strong>HOVER</strong> to interact<br>
        <strong>CLICK</strong> to ignite
      </div>
      <div class="coordinates" id="coords">
        X: 0.000 Y: 0.000<br>
        STATE: IDLE
      </div>
    </div>
  </div>

  <div id="state-indicator">STANDBY</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./src/main.js"></script>

  <script type="module">
    const coords = document.getElementById('coords');
    const stateIndicator = document.getElementById('state-indicator');

    window.addEventListener('mousemove', (e) => {
      const x = ((e.clientX / window.innerWidth) * 2 - 1).toFixed(3);
      const y = (-(e.clientY / window.innerHeight) * 2 + 1).toFixed(3);
      coords.innerHTML = `X: ${x} Y: ${y}<br>STATE: ${window.__appState || 'IDLE'}`;
    });

    setInterval(() => {
      stateIndicator.textContent = window.__appState === 'hover' ? 'ACTIVE'
        : window.__appState === 'exploding' ? 'IGNITION'
        : window.__appState === 'post_explosion' ? 'COOLING'
        : 'STANDBY';
      stateIndicator.className = window.__appState !== 'idle' ? 'active' : '';
    }, 100);
  </script>
</body>
</html>
